<!doctype html>
<!--
==============================================================================
  CATALOG  (PUBLIC HOMEPAGE — root /index.html)
  ===========================================================================
  This is the file served at:
      https://canvascircle.art/
      https://new-canvascircle.pages.dev/

  *** DO NOT confuse with /portal/index.html ***
  /portal/index.html is the signed-in account portal (sign in, dashboard,
  saved listings, sales-post builder). They share <header>/<footer> for
  consistency but the bodies are completely different.

  If you find yourself copy/pasting and you see "Your listings" or
  "Saved listings" tabs in this file — STOP, you've grabbed the wrong one.
==============================================================================
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CanvasCircle — Original & Resold Fine Art</title>

  <link rel="icon" href="/assets/favicon.ico" />
  <link rel="manifest" href="/assets/manifest.webmanifest" />
  <meta name="theme-color" content="#1a1a1a" />

  <!-- Open Graph -->
  <meta property="og:title"       content="CanvasCircle — Original & Resold Fine Art" />
  <meta property="og:description" content="A curated catalog of original and resold fine art from independent collectors and artists." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://canvascircle.art" />
  <meta property="og:image"       content="https://canvascircle.art/assets/og-image.png" />
  <meta name="twitter:card"       content="summary_large_image" />

  <style>
    :root {
      --bg:        #faf9f6;
      --fg:        #1a1a1a;
      --muted:     #6b6b6b;
      --accent:    #b8860b;
      --card-bg:   #ffffff;
      --card-line: #e8e4dc;
      --shadow:    0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
      --green:     #2a7a3e;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    header {
      padding: 18px 16px;
      border-bottom: 1px solid var(--card-line);
      background: #fff;
      display: flex; align-items: center; justify-content: space-between;
    }
    header .brand { display: flex; align-items: center; gap: 10px; }
    header img    { height: 32px; width: 32px; border-radius: 6px; }
    header .title { font-weight: 600; font-size: 18px; letter-spacing: .2px; }
    nav a { color: var(--fg); text-decoration: none; margin-left: 16px; font-size: 14px; }
    nav a:hover { color: var(--accent); }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }
    .hero {
      text-align: center;
      padding: 14px 16px 14px;
    }
    .hero p.tagline {
      margin: 0; color: var(--muted);
      font-size: 14px; line-height: 1.45;
    }
    .hero p.tagline strong { color: var(--fg); font-weight: 600; }

    /* ---- Filter toolbar ---- */
    .toolbar {
      background: var(--card-bg);
      border: 1px solid var(--card-line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toolbar-row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
    }
    .toolbar-row.search-row {
      grid-template-columns: 1fr auto;
    }
    .toolbar-row.filter-row {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    /* On wider screens, fit each filter at no less than 150px so labels don't
       get clipped. The grid wraps to a second row if needed instead of
       squeezing everything. */
    @media (min-width: 720px) {
      .toolbar-row.filter-row {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
    }
    .price-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      grid-column: span 2;
    }
    @media (min-width: 720px) {
      .price-pair { grid-column: span 2; min-width: 200px; }
    }
    .toolbar input[type="search"],
    .toolbar input[type="number"],
    .toolbar select {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--card-line);
      background: #fff;
      color: var(--fg);
      font-size: 14px;
      font-family: inherit;
      min-width: 0;          /* let grid items shrink properly */
    }
    /* Use the browser-native dropdown arrow (smaller, well-positioned).
       Just make sure the text doesn't run under it. */
    .toolbar select { padding-right: 24px; }
    .toolbar input[type="number"] { -moz-appearance: textfield; }
    .toolbar input[type="number"]::-webkit-outer-spin-button,
    .toolbar input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    .toolbar input:focus,
    .toolbar select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184,134,11,.15);
    }
    .toolbar .clear-btn {
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid var(--card-line);
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      white-space: nowrap;
    }
    .toolbar .clear-btn:hover {
      color: var(--fg);
      border-color: #ccc;
    }
    .stats {
      color: var(--muted);
      font-size: 13px;
      padding: 0 4px 12px;
    }

    /* ---- Status / empty ---- */
    #status, .empty {
      margin: 24px auto;
      max-width: 540px;
      padding: 16px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--card-line);
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }
    #status.error { color: #a8281f; border-color: #f1c4be; background: #fef6f5; }
    .empty .empty-title { color: var(--fg); font-weight: 600; margin-bottom: 4px; }

    /* ---- Grid + cards ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    @media (min-width: 720px)  { .grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
    @media (min-width: 1000px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-line);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      color: inherit;
      text-decoration: none;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .card:hover, .card:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
    }
    .card .img { aspect-ratio: 1/1; background: #f0ede6; overflow: hidden; position: relative; }
    .card .img img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Heart/save button — sits as a sibling of the card link to avoid
       button-inside-anchor weirdness. The wrap takes the grid slot; the
       link fills it; the heart absolutely-positions itself. */
    .card-wrap { position: relative; }
    .card-wrap .heart-btn {
      position: absolute;
      top: 8px; right: 8px;
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,.92);
      color: #555;
      border: none;
      border-radius: 999px;
      padding: 4px 9px 4px 8px;
      font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.18);
      transition: transform .12s ease, background .12s ease;
      z-index: 2;
    }
    .card-wrap .heart-btn:hover { transform: scale(1.06); background: #fff; }
    .card-wrap .heart-btn .heart-glyph { font-size: 14px; line-height: 1; }
    .card-wrap .heart-btn.is-saved { background: #fff; }
    .card-wrap .heart-btn.is-saved .heart-glyph { color: #c93f3f; }
    .card-wrap .heart-btn[disabled] { opacity: .55; cursor: progress; }
    .card .body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 4px; }
    .card .artist {
      font-weight: 600; font-size: 14px; line-height: 1.25;
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
      -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }
    .card .title {
      color: var(--muted); font-size: 13px; line-height: 1.25;
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
      -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }
    /* Price + pills row.
       Desktop:  [price ......... pills]   (single row)
       Mobile:   [price]                   (price gets full width)
                 [pills...]                 (pills wrap to row 2) */
    .card .price-row {
      margin-top: 4px;
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
      flex-wrap: wrap;
    }
    .card .price-row .left  { display: inline-flex; align-items: baseline; gap: 6px; min-width: 0; }
    .card .price-row .pills { display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .card .price  { font-weight: 600; font-size: 14px; white-space: nowrap; color: var(--fg); }
    .card .price .ship-suffix { font-weight: 500; font-size: 12px; color: var(--fg); }
    .card .prev   { color: var(--muted); text-decoration: line-through; font-size: 12px; }
    .card .cat    {
      font-size: 10px; font-weight: 700; letter-spacing: .3px;
      padding: 3px 7px; border-radius: 999px;
      background: #efe9d8; color: #6a4c00; border: 1px solid #e3d8b1;
      white-space: nowrap; line-height: 1.2;
    }
    .card .cat.unique  { background: #d6efdf; color: #1f5b32; border-color: #a8d9b8; }
    .card .cat.edition { background: #d6e6f7; color: #1f4a78; border-color: #a8c8e3; }
    .card .cat.sold    { background: #f3d6d3; color: #8a1f1a; border-color: #e8b3ad; }

    /* Pills always live on their own row below the price — keeps card heights
       uniform whether or not there's a price drop / strikethrough showing. */
    .card .price-row .pills {
      flex: 0 0 100%;
      justify-content: flex-start;
    }
    @media (max-width: 480px) {
      .card .artist { font-size: 13px; }
      .card .title  { font-size: 12px; }
      .card .price  { font-size: 13px; }
      .card .cat    { font-size: 9px; padding: 2px 6px; }
    }
    .card.is-sold .price { color: var(--muted); text-decoration: line-through; }

    /* Show Details CTA — small text at the bottom of the card body so users
       know the card is clickable. The whole card is the link target; this is
       just a visual affordance. */
    .card .cta {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-align: right;
      letter-spacing: .2px;
    }
    .card .cta::after { content: " →"; }
    .card:hover .cta { text-decoration: underline; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 32px 16px;
      border-top: 1px solid var(--card-line);
      background: #fff;
    }

    /* Back to top */
    #back-to-top {
      position: fixed;
      bottom: 20px; right: 20px;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--card-line);
      background: #fff;
      color: var(--fg);
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,.12), 0 1px 3px rgba(0,0,0,.08);
      display: none;
      align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity .15s ease;
    }
    #back-to-top.visible { display: flex; }
    #back-to-top:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <img src="/assets/CanvasCircleLogo.png" alt="CanvasCircle" />
      <span class="title">CanvasCircle</span>
    </div>
    <nav>
      <a href="/">Catalog</a>
      <a href="/portal/" class="cc-auth-link">Log In</a>
      <a href="/guidelines.html">Guidelines</a>
      <a href="/about.html">About</a>
    </nav>
  </header>

  <script type="module" src="/lib/nav-auth.js"></script>

  <main>
    <section class="hero">
      <p class="tagline"><strong>CanvasCircle</strong> — A modern art marketplace for social selling.</p>
    </section>

    <form class="toolbar" id="toolbar" autocomplete="off">
      <div class="toolbar-row search-row">
        <input type="search" id="q" placeholder="Search artist or title&hellip;" />
        <button type="button" class="clear-btn" id="clear">Clear</button>
      </div>
      <div class="toolbar-row filter-row">
        <select id="f-category" title="Category">
          <option value="">All categories</option>
          <option value="Unique/Original">Unique/Original</option>
          <option value="Limited Edition">Limited Edition</option>
        </select>
        <select id="f-status" title="Status">
          <option value="available" selected>Available</option>
          <option value="sold">Sold</option>
        </select>
        <select id="f-seller" title="Seller">
          <option value="">All sellers</option>
        </select>
        <select id="f-artist" title="Artist">
          <option value="">All artists</option>
        </select>
        <div class="price-pair">
          <input type="number" id="f-min" placeholder="Min $" min="0" step="50" />
          <input type="number" id="f-max" placeholder="Max $" min="0" step="50" />
        </div>
        <select id="f-sort" title="Sort">
          <option value="newest">Newest first</option>
          <option value="price-asc">Price: low to high</option>
          <option value="price-desc">Price: high to low</option>
        </select>
      </div>
    </form>

    <div id="stats" class="stats" hidden></div>
    <div id="status">Loading catalog&hellip;</div>
    <div id="grid" class="grid" hidden></div>
    <div id="sentinel" aria-hidden="true" style="height: 1px;"></div>
    <div id="empty" class="empty" hidden>
      <div class="empty-title">No listings match your filters</div>
      <div>Try clearing one or two of them.</div>
    </div>
  </main>

  <button type="button" id="back-to-top" aria-label="Back to top" hidden>↑</button>

  <footer>
    &copy; CanvasCircle.
    <a href="/about.html" style="color:inherit;">About</a> &middot;
    <a href="/guidelines.html" style="color:inherit;">Guidelines</a> &middot;
    <a href="/portal/" style="color:inherit;" class="cc-auth-link">Log In</a>
  </footer>

  <script type="module">
    import { supabase, publicImageUrl } from "/lib/supabase.js";
    import { getCurrentUserSaves, toggleSave } from "/lib/saves.js";
    import { showAuthPrompt } from "/lib/auth-prompt.js";

    const $status   = document.getElementById("status");
    const $grid     = document.getElementById("grid");
    const $empty    = document.getElementById("empty");
    const $stats    = document.getElementById("stats");
    const $sentinel = document.getElementById("sentinel");
    const $back     = document.getElementById("back-to-top");
    const $q        = document.getElementById("q");
    const $cat      = document.getElementById("f-category");
    const $statusF  = document.getElementById("f-status");
    const $seller   = document.getElementById("f-seller");
    const $artist   = document.getElementById("f-artist");
    const $min      = document.getElementById("f-min");
    const $max      = document.getElementById("f-max");
    const $sort     = document.getElementById("f-sort");
    const $clear    = document.getElementById("clear");

    const PAGE_SIZE = 16;

    let allListings   = [];
    let filteredRows  = [];
    let renderedCount = 0;
    let userSavesSet  = null;     // Set<listing_id> of saves for current user, or null if unsigned

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
      }[c]));
    }

    function renderCard(listing) {
      const images = (listing.listing_images || []).slice().sort((a,b) => a.position - b.position);
      const firstPath = images[0]?.storage_path;
      const wrap = document.createElement("div");
      wrap.className = "card-wrap";
      wrap.dataset.listingId = listing.listing_id;
      const card = document.createElement("a");
      card.className = "card" + (listing.status === "sold" ? " is-sold" : "");
      card.href = `/listing.html?id=${listing.listing_id}`;
      const imgUrl = firstPath ? publicImageUrl(firstPath) : "";
      const price  = Number(listing.asking_price_usd || 0).toLocaleString();
      const prev   = listing.previous_price_usd
                      && Number(listing.previous_price_usd) > Number(listing.asking_price_usd)
                      ? Number(listing.previous_price_usd).toLocaleString()
                      : null;
      const catCls   = listing.artwork_category === "Unique/Original" ? " unique"
                     : listing.artwork_category === "Limited Edition" ? " edition" : "";
      const catLabel = listing.artwork_category || "";
      const isSold   = listing.status === "sold";
      const saved    = !!(userSavesSet && userSavesSet.has(listing.listing_id));
      const saveN    = Number(listing.save_count || 0);
      const shipSuffix = !isSold
        ? (listing.shipping_offered === "Yes" ? " shipped" : " + shipping")
        : "";
      card.innerHTML = `
        <div class="img">${imgUrl ? `<img src="${imgUrl}" alt="" loading="lazy" decoding="async" />` : ""}</div>
        <div class="body">
          <div class="artist">${escapeHtml(listing.artist_name || "Unknown")}</div>
          <div class="title">${escapeHtml(listing.artwork_title || "")}</div>
          <div class="price-row">
            <span class="left">
              <span class="price">$${price}<span class="ship-suffix">${shipSuffix}</span></span>${prev ? `<span class="prev">$${prev}</span>` : ""}
            </span>
            <span class="pills">
              ${isSold ? `<span class="cat sold">SOLD</span>` : ""}
              ${catLabel ? `<span class="cat${catCls}">${escapeHtml(catLabel)}</span>` : ""}
            </span>
          </div>
          <div class="cta">Show details</div>
        </div>`;
      const heart = document.createElement("button");
      heart.type = "button";
      heart.className = "heart-btn" + (saved ? " is-saved" : "");
      heart.setAttribute("aria-label", saved ? "Unsave" : "Save listing");
      heart.innerHTML = `<span class="heart-glyph">${saved ? "♥" : "♡"}</span><span class="heart-count">${saveN}</span>`;
      wrap.appendChild(card);
      wrap.appendChild(heart);
      return wrap;
    }

    // Event delegation: heart clicks anywhere in the grid
    async function onHeartClick(btn) {
      const wrap = btn.closest(".card-wrap");
      if (!wrap) return;
      const id = wrap.dataset.listingId;
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        showAuthPrompt({ message: "Sign up to save listings. Same account also lets you sell — no commitment." });
        return;
      }
      btn.disabled = true;
      const $glyph = btn.querySelector(".heart-glyph");
      const $count = btn.querySelector(".heart-count");
      const wasSaved = btn.classList.contains("is-saved");
      // Optimistic UI
      btn.classList.toggle("is-saved", !wasSaved);
      $glyph.textContent = !wasSaved ? "♥" : "♡";
      $count.textContent = String(Math.max(0, Number($count.textContent || 0) + (wasSaved ? -1 : 1)));
      try {
        const nowSaved = await toggleSave(id);
        // Sync the in-memory listing record so re-renders are correct
        const rec = allListings.find(l => l.listing_id === id);
        if (rec) {
          rec.save_count = Math.max(0, Number(rec.save_count || 0) + (nowSaved ? 1 : -1));
        }
      } catch (err) {
        console.error("[heart] toggle failed:", err);
        // Revert
        btn.classList.toggle("is-saved", wasSaved);
        $glyph.textContent = wasSaved ? "♥" : "♡";
        $count.textContent = String(Math.max(0, Number($count.textContent || 0) + (wasSaved ? 1 : -1)));
      } finally {
        btn.disabled = false;
      }
    }

    function populateOptions(selectEl, values) {
      const seen = new Set();
      const opts = [];
      for (const v of values) {
        if (!v) continue;
        const key = String(v).trim();
        if (!key || seen.has(key)) continue;
        seen.add(key);
        opts.push(key);
      }
      opts.sort((a, b) => a.localeCompare(b));
      // keep the first option (the "All …") and append the rest
      const first = selectEl.querySelector("option");
      selectEl.innerHTML = "";
      if (first) selectEl.appendChild(first);
      for (const o of opts) {
        const opt = document.createElement("option");
        opt.value = o;
        opt.textContent = o;
        selectEl.appendChild(opt);
      }
    }

    function applyFilters() {
      const q     = $q.value.trim().toLowerCase();
      const cat   = $cat.value;
      const stf   = $statusF.value;
      const sel   = $seller.value;
      const art   = $artist.value;
      const minP  = Number($min.value);
      const maxP  = Number($max.value);
      const so    = $sort.value;
      const hasMin = $min.value !== "" && !isNaN(minP);
      const hasMax = $max.value !== "" && !isNaN(maxP);

      let rows = allListings.filter(l => {
        if (cat && l.artwork_category !== cat) return false;
        // Default to available; explicit Sold filter shows only sold; no "all" option.
        if (stf === "sold") {
          if (l.status !== "sold") return false;
        } else {
          // "available" (or any other value) = only available listings
          if (l.status !== "available") return false;
        }
        if (sel && (l.profiles?.display_name || "") !== sel) return false;
        if (art && (l.artist_name || "") !== art) return false;
        const p = Number(l.asking_price_usd || 0);
        if (hasMin && p < minP) return false;
        if (hasMax && p > maxP) return false;
        if (q) {
          const hay = `${l.artist_name || ""} ${l.artwork_title || ""}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      if (so === "price-asc")      rows.sort((a,b) => Number(a.asking_price_usd||0) - Number(b.asking_price_usd||0));
      else if (so === "price-desc") rows.sort((a,b) => Number(b.asking_price_usd||0) - Number(a.asking_price_usd||0));
      else                          rows.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

      // Reset incremental render state and draw the first batch.
      filteredRows  = rows;
      renderedCount = 0;
      $grid.innerHTML = "";
      renderNextBatch();

      $stats.hidden = false;
      $stats.textContent = `Showing ${rows.length} of ${allListings.length} listing${allListings.length === 1 ? "" : "s"}`;
      $grid.hidden  = rows.length === 0;
      $empty.hidden = rows.length !== 0;
    }

    function renderNextBatch() {
      const end = Math.min(renderedCount + PAGE_SIZE, filteredRows.length);
      const frag = document.createDocumentFragment();
      for (let i = renderedCount; i < end; i++) frag.appendChild(renderCard(filteredRows[i]));
      $grid.appendChild(frag);
      renderedCount = end;
    }

    async function loadCatalog() {
      const [listingsResp, savesResp] = await Promise.all([
        supabase
          .from("listings")
          .select(`
            listing_id, artist_name, artwork_title, artwork_category,
            asking_price_usd, previous_price_usd, status, created_at, save_count,
            shipping_offered,
            listing_images ( storage_path, position ),
            profiles!listings_seller_id_fkey ( display_name )
          `)
          .eq("moderation_status", "approved")
          .in("status", ["available", "pending", "sold"])
          .order("created_at", { ascending: false }),
        getCurrentUserSaves(),
      ]);
      userSavesSet = savesResp; // Set or null
      const { data: listings, error } = listingsResp;

      if (error) {
        console.error(error);
        $status.textContent = "Could not load the catalog. Please try again later.";
        $status.classList.add("error");
        return;
      }
      if (!listings || listings.length === 0) {
        $status.textContent = "The catalog is empty right now — check back soon.";
        return;
      }
      allListings = listings;
      populateOptions($seller, listings.map(l => l.profiles?.display_name));
      populateOptions($artist, listings.map(l => l.artist_name));
      restoreFilterState(); // pull saved filters from sessionStorage if present
      $status.hidden = true;
      applyFilters();
    }

    // ----- Persistent filter state (sessionStorage) -----
    const FILTER_KEY = "cc_catalog_filters";
    function saveFilterState() {
      try {
        sessionStorage.setItem(FILTER_KEY, JSON.stringify({
          q: $q.value, cat: $cat.value, statusF: $statusF.value,
          seller: $seller.value, artist: $artist.value,
          min: $min.value, max: $max.value, sort: $sort.value,
        }));
      } catch (e) { /* private mode etc — ignore */ }
    }
    function restoreFilterState() {
      try {
        const raw = sessionStorage.getItem(FILTER_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (s.q       != null) $q.value       = s.q;
        if (s.cat     != null) $cat.value     = s.cat;
        if (s.statusF != null) $statusF.value = s.statusF;
        if (s.seller  != null) $seller.value  = s.seller;
        if (s.artist  != null) $artist.value  = s.artist;
        if (s.min     != null) $min.value     = s.min;
        if (s.max     != null) $max.value     = s.max;
        if (s.sort    != null) $sort.value    = s.sort;
      } catch (e) { /* ignore */ }
    }
    function clearFilterState() {
      try { sessionStorage.removeItem(FILTER_KEY); } catch (e) {}
    }

    // Heart click delegation
    document.getElementById("grid").addEventListener("click", (e) => {
      const btn = e.target.closest(".heart-btn");
      if (btn) {
        e.preventDefault();
        e.stopPropagation();
        onHeartClick(btn);
      }
    });

    [$q, $cat, $statusF, $seller, $artist, $min, $max, $sort]
      .forEach(el => el.addEventListener("input", () => { saveFilterState(); applyFilters(); }));
    $clear.addEventListener("click", () => {
      $q.value = "";
      $cat.value = "";
      $statusF.value = "available";
      $seller.value = "";
      $artist.value = "";
      $min.value = "";
      $max.value = "";
      $sort.value = "newest";
      clearFilterState();
      applyFilters();
    });

    // Incremental render — observe the sentinel below the grid.
    if ("IntersectionObserver" in window) {
      const io = new IntersectionObserver((entries) => {
        for (const e of entries) {
          if (e.isIntersecting && renderedCount < filteredRows.length) {
            renderNextBatch();
          }
        }
      }, { rootMargin: "400px 0px" });
      io.observe($sentinel);
    } else {
      // Fallback: render everything if IntersectionObserver isn't available.
      window.addEventListener("scroll", () => {
        if (renderedCount < filteredRows.length &&
            window.innerHeight + window.scrollY >= document.body.offsetHeight - 600) {
          renderNextBatch();
        }
      });
    }

    // Back-to-top button
    function onScroll() {
      if (window.scrollY > 400) $back.classList.add("visible");
      else                       $back.classList.remove("visible");
    }
    window.addEventListener("scroll", onScroll, { passive: true });
    $back.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

    loadCatalog();
  </script>
</body>
</html>
